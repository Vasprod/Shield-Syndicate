<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shield Syndicate — Кабинет</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .cabinet-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 120px 24px 60px;
    }
    .cabinet-card {
      width: 100%;
      max-width: 480px;
      background: var(--bg2);
      border: 1px solid var(--bdr);
      border-top: 2px solid var(--red);
      padding: 48px 40px;
    }
    .cabinet-ava {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid var(--bdr-red);
      margin-bottom: 24px;
    }
    .cabinet-ava img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .cabinet-username {
      font-family: 'Oswald', sans-serif;
      font-size: 11px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .cabinet-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      letter-spacing: .05em;
      color: var(--text);
      margin-bottom: 32px;
    }
    .cabinet-form { display: flex; flex-direction: column; gap: 20px; }
    .cabinet-field { display: flex; flex-direction: column; gap: 8px; }
    .cabinet-label {
      font-family: 'Oswald', sans-serif;
      font-size: 10px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .cabinet-input,
    .cabinet-textarea {
      background: var(--bg3);
      border: 1px solid var(--bdr);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 300;
      padding: 12px 16px;
      outline: none;
      transition: border-color .2s;
      width: 100%;
      resize: none;
    }
    .cabinet-input:focus,
    .cabinet-textarea:focus { border-color: var(--red); }
    .cabinet-textarea { height: 100px; }
    .cabinet-actions {
      display: flex;
      gap: 12px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .cabinet-save {
      font-family: 'Oswald', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: .15em;
      text-transform: uppercase;
      background: var(--red);
      color: #fff;
      border: none;
      padding: 12px 28px;
      cursor: pointer;
      transition: background .2s;
      flex: 1;
    }
    .cabinet-save:hover { background: #a93226; }
    .cabinet-save:disabled { opacity: .5; cursor: default; }
    .cabinet-logout {
      font-family: 'Oswald', sans-serif;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: .15em;
      text-transform: uppercase;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--bdr);
      padding: 12px 20px;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      transition: color .2s, border-color .2s;
    }
    .cabinet-logout:hover { color: var(--text); border-color: var(--bdr-red); }
    .cabinet-status {
      font-size: 12px;
      font-weight: 300;
      color: var(--muted);
      min-height: 18px;
      transition: color .2s;
    }
    .cabinet-status.ok { color: #4caf50; }
    .cabinet-status.err { color: var(--red); }
    .cabinet-joined {
      font-size: 11px;
      font-weight: 300;
      color: var(--muted);
      margin-top: -20px;
      margin-bottom: 8px;
    }

    @media (max-width: 600px) {
      .cabinet-card { padding: 32px 20px; }
      .cabinet-actions { flex-direction: column; }
      .cabinet-save { flex: unset; }
    }
  </style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">
    <img id="navLogoImg" alt="S">
    <span class="nav-logo-name">SHLD</span>
  </a>
  <ul class="nav-links">
    <li><a href="/">Главная</a></li>
    <li><a href="/#about">О клане</a></li>
    <li><a href="/#members">Состав</a></li>
    <li><a href="/#news">Новости</a></li>
  </ul>
  <a href="/api/auth/logout" class="nav-btn">Выйти</a>
</nav>

<div class="cabinet-wrap">
  <div class="cabinet-card" id="cabinetCard" style="display:none">
    <div class="cabinet-ava">
      <img id="cabinetAva" src="" alt="">
    </div>
    <div class="cabinet-username" id="cabinetUsername"></div>
    <div class="cabinet-name" id="cabinetDisplayName"></div>
    <div class="cabinet-joined" id="cabinetJoined"></div>

    <form class="cabinet-form" id="cabinetForm">
      <div class="cabinet-field">
        <label class="cabinet-label" for="nickInput">Никнейм на сайте</label>
        <input class="cabinet-input" id="nickInput" type="text" maxlength="32" placeholder="Твой ник">
      </div>
      <div class="cabinet-field">
        <label class="cabinet-label" for="descInput">О себе</label>
        <textarea class="cabinet-textarea" id="descInput" maxlength="300" placeholder="Пару слов о себе..."></textarea>
      </div>
      <div class="cabinet-actions">
        <button class="cabinet-save" id="saveBtn" type="submit">Сохранить</button>
        <a class="cabinet-logout" href="/api/auth/logout">Выйти</a>
      </div>
      <div class="cabinet-status" id="cabinetStatus"></div>
    </form>
  </div>
</div>

<script>
  const logoUrl = encodeURI('img/ChatGPT Image 2 мая 2026 г., 14_03_30-Photoroom.png');
  document.getElementById('navLogoImg').src = logoUrl;

  const card     = document.getElementById('cabinetCard');
  const ava      = document.getElementById('cabinetAva');
  const username = document.getElementById('cabinetUsername');
  const dispName = document.getElementById('cabinetDisplayName');
  const joined   = document.getElementById('cabinetJoined');
  const nickIn   = document.getElementById('nickInput');
  const descIn   = document.getElementById('descInput');
  const saveBtn  = document.getElementById('saveBtn');
  const status   = document.getElementById('cabinetStatus');

  async function loadUser() {
    const res = await fetch('/api/user/me');
    if (res.status === 401) {
      window.location.href = '/api/auth/discord';
      return;
    }
    const user = await res.json();

    ava.src            = user.avatar_url;
    username.textContent = '@' + user.discord_username;
    dispName.textContent = user.nickname;
    nickIn.value       = user.nickname;
    descIn.value       = user.description || '';

    if (user.joined_at) {
      const d = new Date(user.joined_at);
      joined.textContent = 'В клане с ' + d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    card.style.display = 'block';
  }

  document.getElementById('cabinetForm').addEventListener('submit', async e => {
    e.preventDefault();
    saveBtn.disabled = true;
    status.textContent = '';
    status.className = 'cabinet-status';

    const res = await fetch('/api/user/update', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nickname: nickIn.value, description: descIn.value }),
    });
    const data = await res.json();

    if (res.ok) {
      dispName.textContent = data.nickname;
      status.textContent = 'Сохранено';
      status.className = 'cabinet-status ok';
    } else {
      const msgs = {
        nickname_required: 'Никнейм не может быть пустым',
        nickname_too_long: 'Никнейм слишком длинный (макс. 32 символа)',
        description_too_long: 'Описание слишком длинное (макс. 300 символов)',
      };
      status.textContent = msgs[data.error] || 'Ошибка сохранения';
      status.className = 'cabinet-status err';
    }

    saveBtn.disabled = false;
    setTimeout(() => { status.textContent = ''; status.className = 'cabinet-status'; }, 3000);
  });

  loadUser();
</script>
</body>
</html>
