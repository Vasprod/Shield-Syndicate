<!DOCTYPE html>

  <link rel="stylesheet" href="style.css">
  <style>
    .error-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 120px 24px 60px;
    }
    .error-card {
      width: 100%;
      max-width: 480px;
      background: var(--bg2);
      border: 1px solid var(--bdr);
      border-top: 2px solid var(--red);
      padding: 52px 40px;
      text-align: center;
    }
    .error-icon {
      width: 56px;
      height: 56px;
      border: 1px solid var(--bdr);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      color: var(--muted);
    }
    .error-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 30px;
      letter-spacing: .05em;
      color: var(--text);
      margin-bottom: 16px;
      line-height: 1.1;
    }
    .error-desc {
      font-size: 13px;
      font-weight: 300;
      color: var(--muted);
      line-height: 1.75;
      margin-bottom: 36px;
    }
    .error-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .error-join {
      font-family: 'Oswald', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: .15em;
      text-transform: uppercase;
      background: var(--red);
      color: #fff;
      border: none;
      padding: 14px 28px;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background .2s;
    }
    .error-join:hover { background: #a93226; }
    .error-back {
      font-family: 'Oswald', sans-serif;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: .15em;
      text-transform: uppercase;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--bdr);
      padding: 12px 20px;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color .2s, border-color .2s;
    }
    .error-back:hover { color: var(--text); border-color: var(--bdr-red); }
  </style>
</head>
